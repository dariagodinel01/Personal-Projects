<!DOCTYPE html>
<html >

<head>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />


    <title> Learn Laguages </title>


    <link rel="stylesheet" type="text/css" href="/css/bootstrap.css" />
    <link href="/css/font.css" rel="stylesheet"/>
    <link href="/css/adminpage.css" rel="stylesheet"/>
    <link href="/css/responsive.css" rel="stylesheet"/>
</head>
<body>

<header class="header_section">
    <div class="container-fluid">
        <nav class="navbar">
            <a href="/home" class="navbar-brand">
                <span>NewLaguages</span>
            </a>
            <div class="list-nav">
                <div th:unless="${isAuthenticated}">
                    <a href="/login">Login</a>
                    <a href="/signin">Sign up</a>
                    <a href="/french">Learn French</a>
                </div>
                <div th:if="${isAuthenticated}">
                    <a href="/french">Learn French</a>
                    <a href="/forum">Forum</a>
                    <a href="/logout">Logout</a>
                </div>

            </div>
        </nav>
    </div>
</header>

<section class="main_section position-relative">
    <div class="main_bg_box">
        <img src="/images/useradmin.jpg" alt="">
    </div>
    <div class="main_bg"></div>
    <div class="container">
        <div class="col-md-24 ml-auto">
            <div class="detail-box">
                <h1>Welcome, Admin <span th:text="${user.fullname}"></span>!</h1>
                <br>
                <h3>Here you can see a list with all the users:</h3>
                <br>
                <button id="progress" class="button">Users</button>
                <br>
                <div id="tableContainer" class="table-container" style="display: none;">
                    <button id="closeButton" class="close-button">x</button>
                    <table id="users">

                        <tr>
                            <th>No.</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>


                        </tr>

                        <tr  th:each="user : ${users}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.fullname}"></td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${user.role}"></td>

                        </tr>

                    </table>

                </div>
                <button onclick="toggleChatWindow()" id="chatwindow" title="Chat with me">Chat</button>

                <div id="chatWindowcontainer" class="window-container" style="display: none;">
                    <iframe src="http://127.0.0.1:5000/" id="chatContainer"></iframe>


                </div>
            </div>
        </div>
    </div>
</section>
<script>
    function toggleChatWindow() {
        var chatWindow = document.getElementById('chatWindowcontainer');
        chatWindow.style.display = chatWindow.style.display === 'none' ? 'block' : 'none';
    }


    document.getElementById('progress').addEventListener('click', function() {

        var tableContainer = document.getElementById('tableContainer');

        if (tableContainer.style.display === 'none' || tableContainer.style.display === '') {
            tableContainer.style.display = 'block';
        } else {
            tableContainer.style.display = 'none';
        }
    });


    document.getElementById('closeButton').addEventListener('click', function() {

        var tableContainer = document.getElementById('tableContainer');
        tableContainer.style.display = 'none';
    });

</script>

<footer class="footer_section">
    <div class="container">
        <div class="row">
            <div class="col-md-4 footer-col">

            </div>
            <div class="col-md-4 footer-col">
                <div class="footer_detail">
                    <a href="" class="footer-logo">
                        NewLanguages
                    </a>

                </div>
            </div>

        </div>
        <div class="footer-info">
            <p>&copy; <span id="displayYear"></span>All Rights Reserved By
                <a href="#">NewLanguages</a></p>
        </div>
    </div>
</footer>


</body>
</html>
